name: AI TradeBot — Market Open Scan

on:
  schedule:
    - cron: '35 13 * * 1-5'   # 9:35 AM ET (EDT) — 5 min after open
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run morning scan
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONPATH: src
          TRADEBOT_MODE: scan
        run: python src/main.py

      - name: Commit watchlist
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"
          git add data/watchlist.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "🔍 Morning scan $(date -u '+%Y-%m-%d %H:%M') — watchlist updated" &&
            git push
          )
