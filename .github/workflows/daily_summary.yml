name: AI TradeBot — Daily Summary

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 6:00 PM ET weekdays
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-summary-${{ hashFiles('requirements.txt') }}
      - run: pip install yfinance==0.2.40 pandas==2.2.2 numpy==1.26.4
      - run: python scripts/daily_summary.py
      - name: Commit summary
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "🤖 Daily summary $(date -u '+%Y-%m-%d') — portfolio snapshot" &&
            git push
          )
