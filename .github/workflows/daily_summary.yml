name: AI TradeBot — Multi-Commit Daily

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-bot-v2-${{ hashFiles('requirements.txt') }}
      - run: pip install yfinance==0.2.40 pandas==2.2.2 numpy==1.26.4

      - name: Generate all data
        run: |
          python scripts/daily_summary.py
          python - <<'EOF'
          import yfinance as yf, json, datetime, os
          TODAY = str(datetime.date.today())
          def tz(h):
              if hasattr(h.index,'tz') and h.index.tz: h.index = h.index.tz_convert(None)
              return h
          os.makedirs('data', exist_ok=True)
          # Screener
          symbols=['NVDA','META','AMZN','AAPL','MSFT','GOOGL','CRWD','ANET','AXON','DECK','SNOW','CELH','DDOG','ZS','MELI']
          passed,failed=[],[]
          for sym in symbols:
              try:
                  h=tz(yf.Ticker(sym).history(period='1y'))
                  if h.empty or len(h)<200: failed.append(sym); continue
                  c=float(h['Close'].iloc[-1])
                  s50=float(h['Close'].rolling(50).mean().iloc[-1])
                  s150=float(h['Close'].rolling(150).mean().iloc[-1])
                  s200=float(h['Close'].rolling(200).mean().iloc[-1])
                  hi52=float(h['Close'].rolling(252).max().iloc[-1])
                  lo52=float(h['Close'].rolling(252).min().iloc[-1])
                  score=sum([c>s50,c>s150,c>s200,s50>s150,s150>s200,c>=lo52*1.3,c>=hi52*0.75])
                  if score>=5: passed.append({'symbol':sym,'price':round(c,2),'trend_score':score})
                  else: failed.append(sym)
              except: failed.append(sym)
          with open('data/screener_results.json','w') as f: json.dump({'date':TODAY,'passed':passed,'failed':failed},f,indent=2)
          # Watchlist
          wl={}
          for sym in ['NVDA','META','AMZN','AAPL','MSFT','GOOGL','CRWD','ANET','AXON','DECK']:
              try:
                  h=tz(yf.Ticker(sym).history(period='1y'))
                  if h.empty: continue
                  c=float(h['Close'].iloc[-1])
                  s50=float(h['Close'].rolling(50).mean().iloc[-1])
                  s200=float(h['Close'].rolling(200).mean().iloc[-1])
                  hi52=float(h['Close'].rolling(252).max().iloc[-1])
                  wl[sym]={'price':round(c,2),'above_sma50':c>s50,'above_sma200':c>s200,'pct_from_high':round((c-hi52)/hi52*100,2),'updated':TODAY}
              except: pass
          with open('data/watchlist.json','w') as f: json.dump(wl,f,indent=2)
          # Risk metrics
          with open('data/portfolio.json') as f: p=json.load(f)
          total=p['cash']+sum(wl.get(sym,{}).get('price',pos.get('avg_entry',0))*pos['shares'] for sym,pos in p['positions'].items())
          ret=round((total-p['starting_capital'])/p['starting_capital']*100,2)
          with open('data/risk_metrics.json','w') as f:
              json.dump({'date':TODAY,'total_value':round(total,2),'return_pct':ret,'open_positions':len(p['positions']),'cash':p['cash']},f,indent=2)
          print('All TradeBot data generated')
          EOF

      - name: Configure git
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"

      - name: Commit portfolio summary
        run: |
          git add reports/$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "🤖 Portfolio summary $(date -u '+%Y-%m-%d') — P&L snapshot"

      - name: Commit screener results
        run: |
          git add data/screener_results.json
          git diff --staged --quiet || git commit -m "🔬 Minervini screener $(date -u '+%Y-%m-%d') — trend template scan"

      - name: Commit watchlist
        run: |
          git add data/watchlist.json
          git diff --staged --quiet || git commit -m "🔍 Watchlist $(date -u '+%Y-%m-%d') — CAN SLIM candidates updated"

      - name: Commit risk metrics
        run: |
          git add data/risk_metrics.json
          git diff --staged --quiet || git commit -m "⚠️ Risk metrics $(date -u '+%Y-%m-%d') — PTJ rules · drawdown checked"

      - name: Push all commits
        run: git push
