name: AI TradeBot Daily Summary

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-tradebot-${{ hashFiles('requirements.txt') }}

      - run: pip install yfinance==0.2.40 pandas==2.2.2 numpy==1.26.4

      - run: python scripts/daily_summary.py
      - run: python scripts/screener.py
      - run: python scripts/risk_snapshot.py

      - name: Update watchlist
        run: |
          python - <<'PYEOF'
import yfinance as yf, json, datetime, os
TODAY = str(datetime.date.today())
WATCH = ["NVDA","META","AMZN","AAPL","MSFT","GOOGL","CRWD","ANET","AXON","DECK"]
wl = {}
for sym in WATCH:
    try:
        h = yf.Ticker(sym).history(period="1y")
        if h.empty: continue
        if hasattr(h.index,"tz") and h.index.tz: h.index = h.index.tz_convert(None)
        c = float(h["Close"].iloc[-1])
        s50 = float(h["Close"].rolling(50).mean().iloc[-1])
        s200 = float(h["Close"].rolling(200).mean().iloc[-1])
        hi52 = float(h["Close"].rolling(252).max().iloc[-1])
        wl[sym] = {"price":round(c,2),"above_sma50":c>s50,"above_sma200":c>s200,"pct_from_high":round((c-hi52)/hi52*100,2),"updated":TODAY}
    except: pass
with open("data/watchlist.json","w") as f: json.dump(wl,f,indent=2)
print(f"Watchlist done: {list(wl.keys())}")
PYEOF

      - name: Configure git
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"

      - name: Commit portfolio summary
        run: |
          git add reports/$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "🤖 Portfolio $(date -u '+%Y-%m-%d') — P&L snapshot"

      - name: Commit screener
        run: |
          git add data/screener_results.json
          git diff --staged --quiet || git commit -m "🔬 Screener $(date -u '+%Y-%m-%d') — Minervini trend scan"

      - name: Commit risk metrics
        run: |
          git add data/risk_metrics.json
          git diff --staged --quiet || git commit -m "⚠️ Risk $(date -u '+%Y-%m-%d') — PTJ rules checked"

      - name: Commit watchlist
        run: |
          git add data/watchlist.json
          git diff --staged --quiet || git commit -m "🔍 Watchlist $(date -u '+%Y-%m-%d') — candidates updated"

      - run: git push
