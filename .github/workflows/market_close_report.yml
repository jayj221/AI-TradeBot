name: AI TradeBot — Market Close Report

on:
  schedule:
    - cron: '5 20 * * 1-5'   # 4:05 PM ET (EDT) — 5 min after close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run close session
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONPATH: src
          TRADEBOT_MODE: close
        run: python src/main.py

      - name: Commit session results
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"
          git add data/portfolio.json data/trades_log.csv reports/
          git diff --staged --quiet && echo "No changes." || (
            SUMMARY=$(python scripts/commit_summary.py) &&
            git commit -m "📊 Close $(date -u '+%Y-%m-%d') | $SUMMARY" &&
            git push
          )
